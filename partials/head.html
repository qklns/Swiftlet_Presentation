<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นกแอ่น — Thesis Research</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Inter:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sarabun', 'Inter', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    overflow: hidden;
  }

  .presentation { width: 100vw; height: 100vh; position: relative; }

  .slide {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    display: none; padding: 56px 80px;
    flex-direction: column; justify-content: center;
    transition: opacity 0.4s ease;
  }

  .slide.active { display: flex; }

  /* THEMES */
  .slide-cover {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #0d1b2a 100%);
    align-items: center; text-align: center;
  }
  .slide-dark { background: #111827; }
  .slide-accent { background: linear-gradient(135deg, #0f2027 0%, #1a3a4a 100%); }
  .slide-light { background: #f4f6f8; color: #1a1a1a; }
  .slide-split { background: #111827; flex-direction: row; gap: 60px; align-items: center; }
  .slide-final { background: linear-gradient(135deg, #0d1b2a 0%, #0a2a1a 100%); align-items: center; text-align: center; }

  /* TYPOGRAPHY */
  .overline {
    font-size: 11px; font-weight: 600;
    letter-spacing: 4px; text-transform: uppercase;
    color: #7eb8c9; margin-bottom: 16px;
  }

  h1.hero {
    font-size: 80px; font-weight: 800;
    line-height: 1.0; letter-spacing: -2px;
    color: #ffffff; margin-bottom: 20px;
  }

  h2.title {
    font-size: 40px; font-weight: 700;
    line-height: 1.2; color: #ffffff; margin-bottom: 12px;
  }
  .slide-light h2.title { color: #0d1b2a; }

  h3.section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: #7eb8c9; margin-bottom: 20px;
  }
  .slide-light h3.section-title { color: #2a7090; }

  p.body-text {
    font-size: 17px; font-weight: 300;
    line-height: 1.85; color: #c8d8e0; max-width: 820px;
  }
  .slide-light p.body-text { color: #374151; }
  p.body-text strong { color: #ffffff; font-weight: 600; }
  .slide-light p.body-text strong { color: #0d1b2a; }

  p.subtitle {
    font-size: 20px; font-weight: 300;
    color: #8ab4c2; margin-bottom: 8px;
  }

  /* QUOTE */
  .quote-block {
    border-left: 3px solid #7eb8c9;
    padding: 18px 28px; margin: 28px 0;
    background: rgba(126,184,201,0.06);
    border-radius: 0 8px 8px 0;
  }
  .quote-block p {
    font-size: 18px; font-style: italic;
    line-height: 1.75; color: #e0edf2; font-weight: 300;
  }
  .slide-light .quote-block { background: rgba(42,112,144,0.08); border-left-color: #2a7090; }
  .slide-light .quote-block p { color: #1a3a4a; }

  /* STAT CARDS */
  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; margin-top: 28px; }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(126,184,201,0.15);
    border-radius: 12px; padding: 26px 22px;
  }
  .stat-card .stat-number {
    font-size: 34px; font-weight: 800;
    color: #7eb8c9; line-height: 1; margin-bottom: 8px;
  }
  .stat-card .stat-label { font-size: 13px; color: #8ab4c2; line-height: 1.5; }

 /* CONDITION CARDS */
  .condition-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-top: 24px; }
  .condition-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 22px;
    position: relative; overflow: hidden;
  }
  .condition-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; width: 3px; height: 100%;
    background: #7eb8c9;
  }
  .condition-card .icon { font-size: 26px; margin-bottom: 8px; }
  .condition-card .cond-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: #7eb8c9; margin-bottom: 5px;
  }
  .condition-card .cond-value {
    font-size: 22px; font-weight: 700;
    color: #ffffff; margin-bottom: 4px;
  }
  .condition-card .cond-note { font-size: 13px; color: #7a9aaa; line-height: 1.5; }

  /* SPLIT */
  .split-left { flex: 1; }
  .split-right { flex: 1; display: flex; flex-direction: column; gap: 14px; }

  .info-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(126,184,201,0.12);
    border-radius: 10px; padding: 18px 22px;
  }
  .info-card .info-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: #7eb8c9; margin-bottom: 5px;
  }
  .info-card .info-value { font-size: 15px; color: #d0e4ec; line-height: 1.5; }

  /* CONFLICT */
  .conflict-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; margin-top: 28px; }
  .conflict-card {
    background: rgba(255,255,255,0.03);
    border-radius: 12px; padding: 26px 22px;
    text-align: center; border: 1px solid rgba(255,255,255,0.06);
  }
  .conflict-card .c-icon { font-size: 34px; margin-bottom: 14px; }
  .conflict-card .c-title { font-size: 15px; font-weight: 600; color: #ffffff; margin-bottom: 10px; }
  .conflict-card .c-desc { font-size: 13px; color: #7a9aaa; line-height: 1.6; }

  /* VERSUS TABLE */
  .versus-table { width: 100%; margin-top: 24px; border-collapse: collapse; }
  .versus-table th { padding: 12px 22px; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .versus-table th:nth-child(1) { color: #7eb8c9; text-align: left; width: 22%; }
  .versus-table th:nth-child(2) { color: #f0a070; text-align: center; width: 39%; }
  .versus-table th:nth-child(3) { color: #70b0a0; text-align: center; width: 39%; }
  .versus-table td { padding: 13px 22px; font-size: 15px; border-top: 1px solid rgba(255,255,255,0.06); }
  .versus-table td:nth-child(1) { color: #8ab4c2; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .versus-table td:nth-child(2) { color: #f0d0b8; text-align: center; background: rgba(240,160,112,0.05); }
  .versus-table td:nth-child(3) { color: #b8e0d4; text-align: center; background: rgba(112,176,160,0.05); }

  /* TIMELINE */
  .timeline { display: flex; align-items: flex-start; margin-top: 32px; position: relative; }
  .timeline-item { flex: 1; text-align: center; position: relative; }
  .timeline-item::before {
    content: ''; position: absolute;
    top: 20px; left: 50%; width: 100%; height: 2px;
    background: rgba(126,184,201,0.25);
  }
  .timeline-item:last-child::before { display: none; }
  .timeline-dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: #7eb8c9; margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; position: relative; z-index: 1;
  }
  .timeline-days { font-size: 20px; font-weight: 700; color: #ffffff; margin-bottom: 4px; }
  .timeline-label { font-size: 12px; color: #7a9aaa; line-height: 1.4; }

  /* DIVIDER */
  .divider { width: 48px; height: 3px; background: #7eb8c9; margin: 18px 0; }
  .slide-cover .divider { margin: 18px auto; }
  .slide-light .divider { background: #2a7090; }

  /* TAG */
  .tag {
    display: inline-block;
    background: rgba(126,184,201,0.12);
    border: 1px solid rgba(126,184,201,0.3);
    color: #7eb8c9; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 14px; border-radius: 20px; margin-bottom: 22px;
  }

  /* SPECIES */
  .species-row { display: flex; gap: 14px; margin-top: 24px; }
  .species-card {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 20px 40px;
    position: relative;
  }
  .species-card .sp-badge {
    position: absolute;
    top: 14px; left: 14px; z-index: 2;
    background: #7eb8c9; color: #0d1b2a;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; padding: 3px 10px; border-radius: 10px;
  }
  .species-card .sp-name { font-size: 12px; font-style: italic; color: #7eb8c9; margin-bottom: 5px; }
  .species-card .sp-thai { font-size: 16px; font-weight: 600; color: #ffffff; margin-bottom: 7px; }
  .species-card .sp-desc { font-size: 13px; color: #7a9aaa; line-height: 1.6; }

  .sp-img-wrap {
    width: 100%; height: 240px;
    border-radius: 8px; overflow: hidden;
    margin-bottom: 12px; background: rgba(255,255,255,0.04);
    position: relative;
  }
  .sp-img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block; transition: transform 0.4s ease;
  }
  .sp-img:hover { transform: scale(1.04); }
  .sp-img-fallback {
    display: none; width: 100%; height: 100%;
    align-items: center; justify-content: center;
    font-size: 48px; color: #4a7a8a;
  }
  .sp-price { margin-top: 10px; font-size: 13px; font-weight: 600; color: #7eb8c9; letter-spacing: 0.5px; }
  .species-card .sp-img-wrap { margin-top: 28px; }

  /* HIGHLIGHT */
  .highlight { color: #7eb8c9; font-weight: 600; }
  .slide-light .highlight { color: #2a7090; }

  /* BUILDING SPECS */
  .building-specs { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-top: 24px; }
  .spec-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; padding: 18px 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .spec-number { font-size: 28px; font-weight: 800; color: #7eb8c9; min-width: 80px; }
  .spec-detail .spec-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #7a9aaa; margin-bottom: 3px; }
  .spec-detail .spec-desc { font-size: 14px; color: #d0e4ec; line-height: 1.4; }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 24px; }
  .col-block .col-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: #7eb8c9; margin-bottom: 12px;
  }
  .col-block p { font-size: 15px; color: #c8d8e0; line-height: 1.8; font-weight: 300; }

  /* HARVEST */
  .harvest-row { display: flex; gap: 18px; margin-top: 26px; }
  .harvest-card {
    flex: 1; border-radius: 12px; padding: 26px 22px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .harvest-card.pre { background: rgba(126,184,201,0.07); border-color: rgba(126,184,201,0.2); }
  .harvest-card.post { background: rgba(112,176,160,0.06); border-color: rgba(112,176,160,0.2); }
  .harvest-card .h-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; padding: 4px 12px; border-radius: 10px;
    display: inline-block; margin-bottom: 14px;
  }
  .pre .h-tag { background: rgba(126,184,201,0.2); color: #7eb8c9; }
  .post .h-tag { background: rgba(112,176,160,0.2); color: #70b0a0; }
  .harvest-card .h-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 10px; }
  .harvest-card .h-body { font-size: 14px; color: #9ab4be; line-height: 1.7; }

  /* THESIS BOX */
  .thesis-box {
    background: rgba(126,184,201,0.06);
    border: 1px solid rgba(126,184,201,0.2);
    border-radius: 16px; padding: 36px 40px; margin-top: 32px;
    text-align: center;
  }
  .thesis-box .t-label {
    font-size: 11px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: #7eb8c9; margin-bottom: 16px;
  }
  .thesis-box .t-question {
    font-size: 22px; font-weight: 300; color: #e8f4f8;
    line-height: 1.7; font-style: italic;
  }

  /* PROGRESS & NAV */
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #7eb8c9, #4a9ab0);
    transition: width 0.4s ease; z-index: 100;
  }
  .slide-counter {
    position: fixed; bottom: 28px; right: 40px;
    font-size: 12px; color: rgba(255,255,255,0.25);
    letter-spacing: 1px; z-index: 100;
  }
  .nav-btn {
    position: fixed; bottom: 24px;
    background: rgba(126,184,201,0.1);
    border: 1px solid rgba(126,184,201,0.2);
    color: #7eb8c9; font-size: 18px;
    width: 44px; height: 44px; border-radius: 50%;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 100;
  }
  .nav-btn:hover { background: rgba(126,184,201,0.22); border-color: rgba(126,184,201,0.5); }
  .nav-prev { left: 40px; }
  .nav-next { left: 96px; }

  /* SLIDE : LIFE CYCLE / HARVEST CALENDAR */
  #slide-harvest-calendar { justify-content: flex-start; }
  #slide-harvest-calendar .divider { margin-bottom: 12px; }

  /* PRINT / PDF EXPORT */
  @media print {
    body { overflow: visible; }

    .slide {
      display: flex !important;
      position: relative !important;
      page-break-after: always;
      break-after: page;
      min-height: 100vh;
      opacity: 1 !important;
    }

    .slide:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .nav-btn,
    .slide-counter,
    .progress-bar {
      display: none !important;
    }
  }
</style>
